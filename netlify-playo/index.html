<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PLAY.O</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
:root{
  --void:#07070C;--d1:#0C0C13;--d2:#111119;--d3:#17171F;--d4:#1D1D27;--d5:#232330;
  --v:#6C63FF;--v-hi:#8B7FFF;--v-lo:#4A42CC;
  --v-04:rgba(108,99,255,.04);--v-08:rgba(108,99,255,.08);--v-12:rgba(108,99,255,.12);--v-20:rgba(108,99,255,.20);
  --t1:#EEEEF5;--t2:#9090A8;--t3:#505068;--t4:#2C2C3C;
  --ok:#3DDB84;--ok-10:rgba(61,219,132,.10);--wa:#E8A020;--wa-10:rgba(232,160,32,.10);--er:#E8484A;--er-10:rgba(232,72,74,.10);
  --b1:rgba(255,255,255,.04);--b2:rgba(255,255,255,.07);--b3:rgba(255,255,255,.11);--b4:rgba(108,99,255,.22);--b5:rgba(108,99,255,.45);
  --sh1:0 1px 2px rgba(0,0,0,.3);--sh2:0 2px 8px rgba(0,0,0,.4);--sh3:0 8px 32px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);
  --sh-fv:0 0 0 3px rgba(108,99,255,.18);--glow-v:0 0 24px rgba(108,99,255,.15);
  --r1:4px;--r2:6px;--r3:8px;--r4:12px;--r5:16px;
  --spring:cubic-bezier(.16,1,.3,1);--sb:216px;--tb:52px;
}
body{background:var(--void);color:var(--t1);font-family:"Inter",sans-serif;font-size:13.5px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
#app{display:flex;height:100vh;width:100vw}
#sidebar{width:var(--sb);min-width:var(--sb);height:100vh;background:var(--d1);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;position:relative;overflow:hidden}
#sidebar::before{content:"";position:absolute;top:0;left:0;right:0;height:200px;background:radial-gradient(ellipse at 50% 0%,rgba(108,99,255,.06),transparent 70%);pointer-events:none}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{height:var(--tb);background:var(--d1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:24px 28px;background:var(--void)}
#auth-screen{position:fixed;inset:0;background:var(--void);display:flex;align-items:center;justify-content:center;z-index:200;padding:32px 16px}
#auth-screen::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(108,99,255,.08),transparent 65%);pointer-events:none}
.auth-wrap{width:400px;max-width:100%;position:relative;z-index:1}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo img{height:40px;width:auto;display:block;margin:0 auto;filter:drop-shadow(0 0 20px rgba(108,99,255,.25))}
.auth-card{background:var(--d2);border:1px solid var(--b2);border-radius:var(--r5);padding:28px;box-shadow:var(--sh3)}
.auth-tabs{display:flex;border-bottom:1px solid var(--b1);margin-bottom:22px}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.auth-tab.active{color:var(--v);border-bottom-color:var(--v)}
.auth-err{background:var(--er-10);border:1px solid rgba(232,72,74,.2);color:var(--er);padding:10px 12px;border-radius:var(--r2);font-size:12.5px;margin-bottom:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10.5px;font-weight:600;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--d3);border:1px solid var(--b2);border-radius:var(--r2);color:var(--t1);font-size:13px;font-family:inherit;outline:none;transition:border-color .12s,box-shadow .12s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--b5);box-shadow:var(--sh-fv)}
.field select option{background:var(--d3)}
.field textarea{resize:vertical;min-height:72px}
.field-row{display:flex;gap:10px}.field-row .field{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:8px 16px;border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .12s;white-space:nowrap}
.btn-primary{background:var(--v);color:#fff;box-shadow:0 0 20px var(--v-12)}.btn-primary:hover{background:var(--v-hi)}.btn-primary:active{transform:scale(.98)}.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--b2)}.btn-ghost:hover{background:var(--b1);color:var(--t1);border-color:var(--b3)}
.btn-danger{background:var(--er-10);color:var(--er);border:1px solid rgba(232,72,74,.2)}.btn-danger:hover{background:rgba(232,72,74,.15)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:var(--r1)}.btn-full{width:100%}
.sb-brand{padding:0 14px;height:52px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;position:relative;z-index:1;flex-shrink:0}
.sb-logo{height:20px;width:auto;display:block;filter:drop-shadow(0 0 10px rgba(108,99,255,.2))}
.sb-plan{font-size:9px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--v);background:var(--v-08);border:1px solid var(--v-12);padding:2px 6px;border-radius:var(--r1);margin-left:auto}
.nav-scroll{flex:1;overflow-y:auto;padding:6px 0;position:relative;z-index:1}
.nav-section{padding:12px 8px 2px}
.nav-section-label{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:1px;text-transform:uppercase;padding:0 10px;margin-bottom:3px;display:block}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r2);cursor:pointer;color:var(--t3);font-size:13px;transition:all .1s;border:none;background:transparent;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--b1);color:var(--t2)}.nav-item.active{background:var(--v-08);color:var(--t1);font-weight:500}
.nav-item.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:16px;background:var(--v);border-radius:0 2px 2px 0}
.nav-ico{width:14px;height:14px;flex-shrink:0;opacity:.5}.nav-item.active .nav-ico,.nav-item:hover .nav-ico{opacity:.85}
.sb-footer{padding:8px;border-top:1px solid var(--b1);flex-shrink:0;position:relative;z-index:1}
.user-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r2);cursor:pointer;transition:background .1s}.user-pill:hover{background:var(--b1)}
.u-av{width:26px;height:26px;background:var(--v-12);border:1px solid var(--v-20);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--v);flex-shrink:0}
.u-name{font-size:12.5px;font-weight:500;color:var(--t1)}.u-role{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.tb-title{font-size:14px;font-weight:500;color:var(--t1)}.tb-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.card{background:var(--d2);border:1px solid var(--b2);border-radius:var(--r4);overflow:hidden}
.card-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:10.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px}
.card-action{font-size:11.5px;color:var(--v);cursor:pointer;font-weight:500}.card-action:hover{color:var(--v-hi)}
.card-body{padding:4px 0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:var(--d2);border:1px solid var(--b2);border-radius:var(--r4);padding:18px 20px;position:relative;overflow:hidden;transition:border-color .15s,transform .15s}
.kpi-card::after{content:"";position:absolute;top:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,var(--v-12),transparent)}
.kpi-card:hover{border-color:var(--b3);transform:translateY(-1px)}
.kpi-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.kpi-value{font-size:38px;font-weight:300;letter-spacing:-2px;line-height:1;margin-bottom:6px;font-variant-numeric:tabular-nums;color:var(--t1)}
.kpi-sub{font-size:11.5px;color:var(--t3);display:flex;align-items:center;gap:5px}
.kpi-v .kpi-value{color:var(--v-hi)}.kpi-g .kpi-value{color:var(--ok)}.kpi-w .kpi-value{color:var(--wa)}.kpi-r .kpi-value{color:var(--er)}
.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:20px}
.info-row{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--b1);transition:background .1s}
.info-row:last-child{border-bottom:none}.info-row:hover{background:var(--v-04)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.b-online{background:var(--ok-10);color:var(--ok);border:1px solid rgba(61,219,132,.2)}
.b-offline{background:var(--er-10);color:var(--er);border:1px solid rgba(232,72,74,.2)}
.b-active{background:var(--v-08);color:var(--v);border:1px solid var(--v-20)}
.b-wait{background:var(--b1);color:var(--t3);border:1px solid var(--b2)}
.b-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.b-online .b-dot{animation:pulse-dot 2.4s ease-in-out infinite}
.s-dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-dot.online{background:var(--ok);box-shadow:0 0 8px rgba(61,219,132,.4);animation:pulse-dot 2.4s ease-in-out infinite}
.s-dot.offline{background:var(--t4)}.s-dot.idle{background:var(--wa)}
.tbl-wrap{background:var(--d2);border:1px solid var(--b2);border-radius:var(--r4);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--d3)}
th{padding:10px 16px;text-align:left;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap}
td{padding:12px 16px;border-top:1px solid var(--b1);font-size:13px;vertical-align:middle;color:var(--t2)}
td strong{color:var(--t1);font-weight:500}
tr:hover td{background:rgba(108,99,255,.03)}
.mono{font-family:"JetBrains Mono",monospace;font-size:11.5px}
.onboard-wrap{max-width:540px;margin:32px auto}
.onboard-title{font-size:22px;font-weight:600;color:var(--t1);margin-bottom:8px;letter-spacing:-.3px}
.onboard-sub{font-size:14px;color:var(--t3);margin-bottom:28px;line-height:1.6}
.onboard-steps{display:flex;flex-direction:column;gap:10px}
.onboard-step{background:var(--d2);border:1px solid var(--b2);border-radius:var(--r4);padding:16px 18px;display:flex;align-items:center;gap:14px}
.onboard-step.done{border-color:rgba(61,219,132,.2);background:rgba(61,219,132,.03)}
.onboard-step.active{border-color:var(--v-20);background:var(--v-04)}
.step-num{width:30px;height:30px;border-radius:50%;background:var(--d4);border:1px solid var(--b3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--t2);flex-shrink:0}
.onboard-step.done .step-num{background:var(--ok-10);border-color:rgba(61,219,132,.3);color:var(--ok)}
.onboard-step.active .step-num{background:var(--v-08);border-color:var(--v-20);color:var(--v)}
.step-title{font-size:13.5px;font-weight:500;color:var(--t1);margin-bottom:2px}
.step-sub{font-size:12px;color:var(--t3)}
.unit-list{display:flex;flex-direction:column;gap:8px}
.unit-card{background:var(--d2);border:1px solid var(--b2);border-radius:var(--r4);overflow:hidden;transition:border-color .15s}
.unit-card:hover{border-color:var(--b3)}
.unit-card-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .1s}
.unit-card-hdr:hover{background:var(--v-04)}
.uc-chevron{width:14px;height:14px;color:var(--t3);flex-shrink:0;transition:transform .18s var(--spring)}
.unit-card.open .uc-chevron{transform:rotate(90deg)}
.uc-name{font-size:13.5px;font-weight:500;color:var(--t1);flex:1}
.uc-sub{font-size:11.5px;color:var(--t3);margin-top:2px}
.unit-card-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .22s var(--spring)}
.unit-card.open .unit-card-body{grid-template-rows:1fr}
.unit-card-body>div{overflow:hidden}
.spaces-list{padding:12px 18px 16px;border-top:1px solid var(--b1)}
.space-item{background:var(--d3);border:1px solid var(--b2);border-radius:var(--r3);padding:12px 14px;margin-bottom:8px}
.space-item:last-child{margin-bottom:0}
.space-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.space-name{font-size:13px;font-weight:500;color:var(--t1);flex:1}
.space-code{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--v);background:var(--v-08);border:1px solid var(--v-12);padding:2px 8px;border-radius:var(--r1);letter-spacing:2px}
.space-meta{font-size:11.5px;color:var(--t3);margin-bottom:8px}
.space-cnt-list{margin-bottom:10px}
.space-cnt-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--b1)}
.space-cnt-row:last-child{border-bottom:none}
.space-cnt-thumb{width:28px;height:18px;background:var(--d4);border:1px solid var(--b2);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--v);flex-shrink:0}
.space-cnt-name{flex:1;font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.space-actions{display:flex;gap:6px;flex-wrap:wrap}
.cnt-rows{display:flex;flex-direction:column;gap:6px}
.cnt-row{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--d2);border:1px solid var(--b2);border-radius:var(--r3);cursor:pointer;transition:all .12s}
.cnt-row:hover{border-color:var(--b3);transform:translateX(2px)}
.cnt-thumb{width:40px;height:28px;background:var(--d4);border:1px solid var(--b2);border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--v);flex-shrink:0}
.cnt-row-name{font-size:13px;font-weight:500;color:var(--t1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cnt-row-meta{font-size:11.5px;color:var(--t3);margin-top:2px}
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px;max-height:260px;overflow-y:auto;padding:2px}
.prog-card{background:var(--d4);border:2px solid var(--b2);border-radius:var(--r3);padding:10px;cursor:pointer;transition:all .12s;text-align:center;position:relative}
.prog-card:hover{border-color:var(--b4)}.prog-card.selected{border-color:var(--v);background:var(--v-08)}
.prog-card-ico{font-size:20px;margin-bottom:5px}.prog-card-name{font-size:11px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-card-meta{font-size:10px;color:var(--t3);margin-top:2px}
.prog-card-check{position:absolute;top:5px;right:5px;width:14px;height:14px;background:var(--v);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:9px;color:#fff}
.prog-card.selected .prog-card-check{display:flex}
.space-checks{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto}
.space-check-group{margin-bottom:10px}
.space-check-unit{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;padding-left:2px}
.space-check-pill{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--d3);border:1px solid var(--b2);border-radius:var(--r2);cursor:pointer;transition:all .1s;font-size:12.5px;color:var(--t2);margin-bottom:4px}
.space-check-pill:hover{border-color:var(--b4);color:var(--t1)}
.space-check-pill input{accent-color:var(--v);cursor:pointer}
.space-check-pill.checked{background:var(--v-08);border-color:var(--v-20);color:var(--t1)}
.alert-strip{background:var(--wa-10);border:1px solid rgba(232,160,32,.2);border-radius:var(--r3);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12.5px;color:var(--wa)}
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:4px}
.tmpl-card{background:var(--d4);border:2px solid var(--b2);border-radius:var(--r3);padding:10px;cursor:pointer;transition:all .12s;text-align:center}
.tmpl-card:hover{border-color:var(--b4)}.tmpl-card.selected{border-color:var(--v);background:var(--v-08)}
.tmpl-ico{font-size:20px;margin-bottom:5px}.tmpl-name{font-size:11px;font-weight:500;color:var(--t1)}
.modal-ov{position:fixed;inset:0;background:rgba(7,7,12,.8);backdrop-filter:blur(12px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--d2);border:1px solid var(--b3);border-radius:var(--r5);width:480px;max-width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--sh3);animation:modalIn .2s var(--spring) both}
.modal-lg{width:560px}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.98)}}
.modal-hdr{padding:24px 24px 0}.modal-title{font-size:15px;font-weight:600;color:var(--t1);letter-spacing:-.2px}
.modal-sub{font-size:12.5px;color:var(--t3);margin-top:4px}
.modal-divider{height:1px;background:var(--b1);margin:16px 0}
.modal-body{padding:0 24px}
.modal-footer{padding:16px 24px 22px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.load-screen{text-align:center;padding:36px 24px}
.load-ring{width:40px;height:40px;border:2px solid var(--b2);border-top-color:var(--v);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;box-shadow:var(--glow-v)}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:4px}.load-sub{font-size:12px;color:var(--t3)}
.err-screen{text-align:center;padding:28px 24px}
.err-ico{font-size:28px;margin-bottom:10px}.err-title{font-size:14px;font-weight:500;color:var(--er);margin-bottom:6px}
.err-msg{font-size:12.5px;color:var(--t2);margin-bottom:18px;line-height:1.6}
.hint{background:var(--v-04);border:1px solid var(--v-12);border-radius:var(--r2);padding:12px 14px;font-size:12.5px;color:var(--t2);line-height:1.8;margin-bottom:16px}
.hint strong{color:var(--t1);font-weight:500}
.code-display{font-family:"JetBrains Mono",monospace;font-size:32px;font-weight:500;letter-spacing:10px;color:var(--v);display:block;text-align:center;margin:12px 0;background:var(--v-08);padding:16px;border-radius:var(--r2);border:1px solid var(--v-20)}
.empty{text-align:center;padding:64px 20px}
.empty-ico{font-size:28px;margin-bottom:12px;opacity:.25}.empty-title{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:6px}
.empty-sub{font-size:12.5px;color:var(--t3);margin-bottom:20px;line-height:1.6;max-width:320px;margin-left:auto;margin-right:auto}
.spin-wrap{display:flex;align-items:center;justify-content:center;height:200px}
.page-spin{width:24px;height:24px;border:2px solid var(--b2);border-top-color:var(--v);border-radius:50%;animation:spin .8s linear infinite;box-shadow:var(--glow-v)}
#toast{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.t-item{background:var(--d4);border:1px solid var(--b3);color:var(--t1);padding:11px 14px;border-radius:var(--r3);font-size:13px;box-shadow:var(--sh3);animation:toastIn .18s var(--spring) both;max-width:320px;pointer-events:all}
.t-ok{border-left:3px solid var(--ok)}.t-err{border-left:3px solid var(--er)}
@keyframes toastIn{from{opacity:0;transform:translateX(14px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .2s var(--spring) both}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
@media(max-width:800px){#sidebar{width:52px;min-width:52px}.sb-plan,.nav-section-label,.u-name,.u-role{display:none}.sb-brand{justify-content:center}.user-pill{justify-content:center}}
</style>

<script>
const API = 'https://signage-api-m5pg.onrender.com/api';
let token = localStorage.getItem('playo_token');
let me = null, pg = 'dashboard';

function toast(msg,type){
  type=type||'ok';
  var e=document.createElement('div');
  e.className='t-item t-'+type;e.textContent=msg;
  document.getElementById('toast').appendChild(e);
  setTimeout(function(){e.style.opacity='0';e.style.transition='opacity .15s';setTimeout(function(){e.remove()},150)},3500);
}
function toastErr(m){toast(m,'err')}

async function api(method,path,body,isForm){
  var h={};
  if(token)h['Authorization']='Bearer '+token;
  var opts={method:method,headers:h};
  if(body&&!isForm){h['Content-Type']='application/json';opts.body=JSON.stringify(body)}
  else if(body&&isForm){opts.body=body}
  var res;
  try{res=await fetch(API+path,opts)}
  catch(x){throw new Error('Sem conexao com o servidor.')}
  var data=await res.json().catch(function(){return {}});
  if(!res.ok)throw new Error(data.error||'Erro '+res.status);
  return data;
}

function closeModal(){
  var ov=document.getElementById('modal-ov');
  ov.style.opacity='0';ov.style.transition='opacity .12s';
  setTimeout(function(){ov.style.display='none';ov.style.opacity='';ov.style.transition=''},120);
}
function openModal(title,body,sub,lg){
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-sub').textContent=sub||'';
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('modal-box').className=lg?'modal modal-lg':'modal';
  document.getElementById('modal-ov').style.display='flex';
}
function setContent(h){document.getElementById('content').innerHTML=h}
function addBtn(label,fn,ghost){
  var b=document.createElement('button');
  b.className='btn '+(ghost?'btn-ghost':'btn-primary');
  b.innerHTML=label;b.onclick=fn;
  document.getElementById('tb-act').appendChild(b);
}
function clearBtns(){document.getElementById('tb-act').innerHTML=''}
function fmtDate(d){return d?new Date(d).toLocaleDateString('pt-BR'):''}
function fmtSize(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB'}
function initials(n){return(n||'?').split(' ').map(function(w){return w[0]}).slice(0,2).join('').toUpperCase()}
function showLoading(msg){document.getElementById('m-body').innerHTML='<div class="load-screen"><div class="load-ring"></div><div class="load-title">'+(msg||'Aguarde...')+'</div></div>'}
function showError(msg,retry){document.getElementById('m-body').innerHTML='<div class="err-screen"><div class="err-ico">x</div><div class="err-title">Algo deu errado</div><div class="err-msg">'+(msg||'Erro desconhecido')+'</div><div style="display:flex;gap:8px;justify-content:center"><button class="btn btn-ghost" onclick="closeModal()">Fechar</button>'+(retry?'<button class="btn btn-primary" onclick="'+retry+'">Tentar novamente</button>':'')+'</div></div>'}

function authTab(tab){
  document.querySelectorAll('.auth-tab').forEach(function(t,i){t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register'))});
  document.getElementById('tab-login').style.display=tab==='login'?'':'none';
  document.getElementById('tab-register').style.display=tab==='register'?'':'none';
  document.getElementById('auth-err').style.display='none';
}
function showAuthErr(m){var e=document.getElementById('auth-err');e.textContent=m;e.style.display='block'}

async function doLogin(){
  var email=document.getElementById('l-email').value.trim();
  var password=document.getElementById('l-pass').value;
  if(!email||!password){showAuthErr('Preencha email e senha');return}
  var btn=document.getElementById('login-btn');
  btn.disabled=true;btn.textContent='Entrando...';
  try{
    var d=await api('POST','/auth/login',{email:email,password:password});
    token=d.token;localStorage.setItem('playo_token',token);me=d.user;enterApp();
  }catch(e){showAuthErr(e.message);btn.disabled=false;btn.textContent='Entrar'}
}

async function doRegister(){
  var d={company_name:document.getElementById('r-company').value.trim(),name:document.getElementById('r-name').value.trim(),email:document.getElementById('r-email').value.trim(),password:document.getElementById('r-pass').value};
  if(!d.company_name||!d.name||!d.email||!d.password){showAuthErr('Preencha todos os campos');return}
  if(d.password.length<8){showAuthErr('Senha deve ter pelo menos 8 caracteres');return}
  var btn=document.getElementById('reg-btn');
  btn.disabled=true;btn.textContent='Criando...';
  try{
    var r=await api('POST','/auth/register',d);
    token=r.token;localStorage.setItem('playo_token',token);me=r.user;enterApp();
  }catch(e){showAuthErr(e.message);btn.disabled=false;btn.textContent='Criar conta gratuita'}
}

function doLogout(){
  localStorage.removeItem('playo_token');token=null;me=null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

function enterApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('u-name').textContent=me&&me.name||'';
  document.getElementById('u-role').textContent=me&&me.role||'';
  document.getElementById('u-av').textContent=initials(me&&me.name);
  document.getElementById('co-plan').textContent=((me&&me.plan)||'starter').toUpperCase();
  go('dashboard');
}

  }).join('');
  _aform={nome:'',titulo:'',corpo:'',layout:'simple',dur:15};
  var layouts=[['simple','Aviso simples'],['alert','Atencao'],['event','Evento'],['info','Informativo'],['institutional','Institucional']];
  var tmplHtml=layouts.map(function(l,i){return '<div class="tmpl-card'+(i===0?' selected':'')+'" data-layout="'+l[0]+'" onclick="selectLayout(this)"><div class="tmpl-ico">'+(i===0?'!':i===1?'?':i===2?'C':i===3?'i':'H')+'</div><div class="tmpl-name">'+l[1]+'</div></div>'}).join('');
  var html='<div class="field"><label>Nome interno</label><input id="an-nome" placeholder="Ex: Aviso sem aula amanha" oninput="_aform.nome=this.value"></div><div class="field"><label>Titulo</label><input id="an-titulo" placeholder="Ex: Atencao!" oninput="_aform.titulo=this.value"></div><div class="field"><label>Texto</label><textarea id="an-corpo" placeholder="Ex: Amanha nao havera aula." oninput="_aform.corpo=this.value"></textarea></div><div class="field"><label>Duracao (segundos)</label><input id="an-dur" type="number" value="15" oninput="_aform.dur=this.value"></div><div class="field"><label>Layout</label><div class="tmpl-grid">'+tmplHtml+'</div></div>'+(spaces.length?'<div class="field"><label>Publicar nos espacos</label><div class="space-checks">'+spaceChecks+'</div></div>':'')+'<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="createAnnouncement()">Criar e publicar</button></div>';
  openModal('Criar comunicado',html,'',true);
}
function selectLayout(el){
  document.querySelectorAll('.tmpl-card').forEach(function(c){c.classList.remove('selected')});
  el.classList.add('selected');_aform.layout=el.dataset.layout;
}
async function createAnnouncement(){
  var name=(document.getElementById('an-nome')||{value:''}).value.trim()||_aform.nome;
  var title=(document.getElementById('an-titulo')||{value:''}).value.trim()||_aform.titulo;
  var body=(document.getElementById('an-corpo')||{value:''}).value.trim()||_aform.corpo;
  var dur=(document.getElementById('an-dur')||{value:15}).value||15;
  if(!name||!title){toastErr('Preencha o nome e o titulo');return}
  var spaceIds=Array.from(document.querySelectorAll('[id^="an-chk-"]:checked')).map(function(el){return el.value});
  showLoading('Criando comunicado...');
  try{await api('POST','/contents/announcement',{name:name,title:title,body:body,duration:parseInt(dur),layout:_aform.layout||'simple',space_ids:spaceIds});closeModal();toast('Comunicado criado e publicado!');PAGES.contents()}catch(e){showError(e.message,'openAnnouncement()')}
}

async function openDistribute(contentId){
  var spaces;
  try{spaces=await api('GET','/spaces')}catch(e){toastErr(e.message);return}
  var unitGroups={};
  spaces.forEach(function(s){if(!unitGroups[s.unit_name])unitGroups[s.unit_name]=[];unitGroups[s.unit_name].push(s)});
  var checks=Object.entries(unitGroups).map(function(entry){
    var uname=entry[0],ss=entry[1];
    return '<div class="space-check-group"><div class="space-check-unit">'+uname+'</div>'+ss.map(function(s){return '<label class="space-check-pill"><input type="checkbox" id="dt-chk-'+s.id+'" value="'+s.id+'" style="accent-color:var(--v)"> '+s.name+'</label>'}).join('')+'</div>';
  }).join('');
  var html=(spaces.length?'<div class="field"><label>Escolha os espacos</label><div class="space-checks">'+checks+'</div></div>':'<div style="color:var(--t3);font-size:13px">Crie espacos primeiro.</div>')+'<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" data-cid="'+contentId+'" onclick="distributeContent(this.dataset.cid)">Distribuir</button></div>';
  openModal('Distribuir conteudo',html,'Escolha onde vai aparecer:',true);
}
async function distributeContent(cid){
  var ids=Array.from(document.querySelectorAll('[id^="dt-chk-"]:checked')).map(function(el){return el.value});
  if(!ids.length){toastErr('Selecione pelo menos um espaco');return}
  showLoading('Distribuindo...');
  try{await api('POST','/contents/'+cid+'/distribute',{space_ids:ids});closeModal();toast('Conteudo distribuido!');PAGES.contents()}catch(e){showError(e.message)}
}
async function delContent(id,name){
  if(!confirm('Remover "'+name+'"?'))return;
  try{await api('DELETE','/contents/'+id);toast('Conteudo removido');PAGES.contents()}catch(e){toastErr(e.message)}
}

(async function(){
  if(token){try{me=await api('GET','/auth/me');enterApp()}catch(x){localStorage.removeItem('playo_token');token=null}}
})();
</script>
</body>
</html>
