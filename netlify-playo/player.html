<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PLAY.O Player</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#0A0A0F;--v:#6C63FF;--v-hi:#8B7FFF;
  --v-08:rgba(108,99,255,.08);--v-12:rgba(108,99,255,.12);--v-20:rgba(108,99,255,.20);
  --t1:#F0EFFF;--t2:#8B8BA0;--t3:#454C60;
  --ok:#4ADE80;--er:#EF4444;
  --b2:rgba(255,255,255,.07);--b3:rgba(255,255,255,.11);
  --r2:6px;--r4:12px;
}
html,body{width:100%;height:100%;background:#000;color:var(--t1);font-family:'Inter',system-ui,sans-serif;overflow:hidden;cursor:none}

/* PAIR SCREEN */
#pair-screen{position:fixed;inset:0;background:var(--void);display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px}
#pair-screen::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,var(--v-08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none}
.pair-logo{position:relative;z-index:1}
.pair-logo img{height:48px;width:auto;display:block;filter:drop-shadow(0 0 20px rgba(108,99,255,.3))}
.pair-title{font-size:16px;font-weight:300;color:var(--t2);position:relative;z-index:1;letter-spacing:.3px}
.pair-form{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:360px}
.pair-input{font-family:'Courier New',monospace;font-size:36px;font-weight:700;letter-spacing:12px;color:var(--v);background:var(--v-08);border:2px solid var(--v-20);border-radius:var(--r4);padding:20px 32px;text-align:center;width:100%;outline:none;text-transform:uppercase;transition:border-color .15s}
.pair-input:focus{border-color:var(--v);box-shadow:0 0 30px var(--v-08)}
.pair-input::placeholder{color:var(--t3);letter-spacing:8px}
.pair-btn{background:var(--v);color:#fff;border:none;border-radius:var(--r2);padding:12px 32px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;width:100%;transition:all .12s}
.pair-btn:hover{background:var(--v-hi)}
.pair-btn:disabled{opacity:.5;cursor:not-allowed}
.pair-error{font-size:13px;color:var(--er);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);padding:8px 14px;border-radius:var(--r2);display:none;text-align:center;width:100%}
.pair-hint{font-size:12px;color:var(--t3);text-align:center;line-height:1.8;position:relative;z-index:1}

/* PLAYER SCREEN */
#player-screen{position:fixed;inset:0;display:none}
.slot{position:absolute;inset:0;transition:opacity .8s ease}
.slot.hidden{opacity:0;pointer-events:none}
.slot video{width:100%;height:100%;object-fit:cover}
.slot img{width:100%;height:100%;object-fit:cover}

/* ANNOUNCEMENT SLOT */
.slot-announce{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:80px;text-align:center}
.announce-title{font-size:72px;font-weight:700;line-height:1.1;margin-bottom:24px;color:#fff}
.announce-body{font-size:40px;font-weight:300;line-height:1.4;color:rgba(255,255,255,.85)}

/* WAIT SCREEN */
#wait-screen{position:fixed;inset:0;background:var(--void);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#wait-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,var(--v-08),transparent 65%);pointer-events:none}
.wait-logo{position:relative;z-index:1}
.wait-logo img{height:44px;width:auto;opacity:.8}
.wait-connected{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ok);position:relative;z-index:1}
.wait-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2.4s ease-in-out infinite}
.wait-info{font-size:14px;color:var(--t2);text-align:center;line-height:1.8;position:relative;z-index:1}
.wait-info strong{color:var(--t1);font-weight:500;display:block;font-size:16px;margin-bottom:4px}
.wait-msg{font-size:12px;color:var(--t3);text-align:center;max-width:400px;line-height:1.6;position:relative;z-index:1}
.wait-sync{font-size:11px;color:var(--t3);font-family:'Courier New',monospace;position:relative;z-index:1}

/* HUD */
#hud{position:fixed;bottom:14px;right:14px;display:flex;align-items:center;gap:6px;opacity:.2;z-index:10;transition:opacity .3s}
#hud:hover{opacity:.6}
#hud-dot{width:6px;height:6px;border-radius:50%;background:var(--ok)}
#hud-dot.off{background:var(--er);animation:none}
#hud-logo img{height:14px;width:auto;opacity:.5}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<script>
var API = 'https://signage-api-m5pg.onrender.com/api';
var HEARTBEAT_MS = 30000;
var CHECK_MS = 30000;

var tvToken = localStorage.getItem('playo_tv_token');
var tvId    = localStorage.getItem('playo_tv_id');
var spaceId = localStorage.getItem('playo_space_id');
var spaceInfo = {};
var playlist = [];
var idx = 0;
var activeSlot = 'a';
var playTimer = null;
var lastSync = '';

function $(id){return document.getElementById(id)}

// SCREENS
function showPair(){$('pair-screen').style.display='flex';$('player-screen').style.display='none';$('wait-screen').style.display='none'}
function showPlayer(){$('pair-screen').style.display='none';$('player-screen').style.display='block';$('wait-screen').style.display='none'}
function showWait(){$('pair-screen').style.display='none';$('player-screen').style.display='none';$('wait-screen').style.display='flex'}
function setOnline(ok){var d=$('hud-dot');if(d)d.className=ok?'':'off'}

// PAIR
async function doPair(){
  var code=($('pair-code').value||'').trim().toUpperCase();
  if(code.length!==6){showErr('Digite os 6 caracteres do código');return}
  var btn=$('pair-btn');
  btn.disabled=true;btn.textContent='Conectando...';
  hideErr();
  try{
    var res=await fetch(API+'/player/pair',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pairing_code:code})});
    var d=await res.json();
    if(!res.ok)throw new Error(d.error||'Código inválido');
    tvToken=d.token;tvId=d.tv_id;spaceId=d.space_id;
    spaceInfo={space_name:d.space_name,unit_id:d.unit_id};
    localStorage.setItem('playo_tv_token',tvToken);
    localStorage.setItem('playo_tv_id',tvId);
    localStorage.setItem('playo_space_id',spaceId);
    startPlayer();
  }catch(e){
    showErr(e.message);
    btn.disabled=false;btn.textContent='Conectar TV';
  }
}

function showErr(m){var e=$('pair-err');e.textContent=m;e.style.display='block'}
function hideErr(){var e=$('pair-err');if(e)e.style.display='none'}

// PLAYER
function startPlayer(){
  setOnline(true);
  loadContents();
  setInterval(heartbeat,HEARTBEAT_MS);
  setInterval(loadContents,CHECK_MS);
}

async function loadContents(){
  if(!tvToken||!tvId)return;
  try{
    var res=await fetch(API+'/player/'+tvId+'/contents',{headers:{Authorization:'Bearer '+tvToken}});
    if(res.status===401){clearStorage();showPair();return}
    var d=await res.json();
    setOnline(true);
    spaceInfo=d.space||spaceInfo;
    lastSync=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    if(!d.contents||!d.contents.length){
      showWait();
      $('wait-space').textContent=spaceInfo.space_name||'Espaço';
      $('wait-unit').textContent=spaceInfo.unit_name||'';
      $('wait-sync').textContent='Última sincronização: '+lastSync;
      return;
    }
    // Update playlist if changed
    var newIds=d.contents.map(function(c){return c.id}).join(',');
    var oldIds=playlist.map(function(c){return c.id}).join(',');
    if(newIds!==oldIds){
      playlist=d.contents;
      idx=0;
      if(playTimer)clearTimeout(playTimer);
      play();
    } else {
      showPlayer();
    }
  }catch(e){
    setOnline(false);
  }
}

function play(){
  if(!playlist.length){showWait();return}
  showPlayer();
  var item=playlist[idx];
  var dur=(item.duration||item.duration_seconds||10)*1000;
  renderItem(item,activeSlot);
  if(playTimer)clearTimeout(playTimer);
  playTimer=setTimeout(function(){
    idx=(idx+1)%playlist.length;
    var next=activeSlot==='a'?'b':'a';
    renderItem(playlist[idx],next);
    $('slot-'+next).classList.remove('hidden');
    $('slot-'+activeSlot).classList.add('hidden');
    activeSlot=next;
    play();
  },dur);
}

function renderItem(item,slot){
  var el=$('slot-'+slot);
  var ct=item.type||item.content_type||'image';
  var base=API.replace('/api','');
  if(ct==='video'){
    var url=item.file_url||(base+'/uploads/'+item.file_path);
    el.innerHTML='<video autoplay muted playsinline loop style="width:100%;height:100%;object-fit:cover" src="'+url+'"></video>';
  } else if(ct==='image'){
    var url=item.file_url||(base+'/uploads/'+item.file_path);
    el.innerHTML='<img style="width:100%;height:100%;object-fit:cover" src="'+url+'">';
  } else if(ct==='announcement'){
    var td={};
    try{td=typeof item.template_data==='string'?JSON.parse(item.template_data):item.template_data||{}}catch(x){}
    var bg=td.bg_color||'#07070C';
    var color=td.primary_color||'#6C63FF';
    el.innerHTML='<div class="slot-announce" style="background:'+bg+'"><div class="announce-title" style="color:'+color+'">'+escHtml(td.title||item.name)+'</div>'+(td.body?'<div class="announce-body">'+escHtml(td.body)+'</div>':'')+'</div>';
  } else {
    el.innerHTML='<div style="width:100%;height:100%;background:#050508;display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(255,255,255,.2)">'+escHtml(item.name)+'</div>';
  }
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function heartbeat(){
  if(!tvToken)return;
  try{
    await fetch(API+'/player/heartbeat',{method:'POST',headers:{Authorization:'Bearer '+tvToken,'Content-Type':'application/json'},body:JSON.stringify({tv_id:tvId,space_id:spaceId})});
    setOnline(true);
  }catch(e){setOnline(false)}
}

function clearStorage(){
  localStorage.removeItem('playo_tv_token');
  localStorage.removeItem('playo_tv_id');
  localStorage.removeItem('playo_space_id');
  tvToken=null;tvId=null;spaceId=null;
}

// INIT
if(tvToken&&tvId){
  startPlayer();
} else {
  showPair();
}
</script>
